deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory

  common:
    path_prefix: /var/loki
    storage:
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules
    replication_factor: 1
    ring:
      instance_addr: 127.0.0.1
      kvstore:
        store: inmemory

  # Required by chart template validation even when using filesystem storage
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  ingester:
    wal:
      enabled: true
      dir: /var/loki/wal

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

  rulerConfig:
    storage:
      type: local
      local:
        directory: /var/loki/rules

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095

  limits_config:
    allow_structured_metadata: true
    reject_old_samples: false
    reject_old_samples_max_age: 168h
    retention_period: 168h
    volume_enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: ${storage_class}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /var/loki

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

chunksCache:
  enabled: false

gateway:
  enabled: true
  basicAuth:
    enabled: false

write:
  enabled: false
  replicas: 0

read:
  enabled: false
  replicas: 0

backend:
  enabled: false
  replicas: 0

resultsCache:
  enabled: false

memberlist:
  service:
    publishNotReadyAddresses: true
  join_members:
    - loki-memberlist