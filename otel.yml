mode: daemonset
alternateConfig:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      start_at: beginning
      include_file_path: true
      operators:
        - type: container

    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

    prometheus:
      config:
        scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
                replacement: $$1
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: "([^:]+)(?::\\d+)?;(\\d+)"
                replacement: "$$1:$$2"
                target_label: __address__

  processors:
    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    batch:
      timeout: 5s
      send_batch_size: 1000

    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.container.name
          - k8s.node.name
          - k8s.deployment.name
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: app.kubernetes.io/name
            key: app.kubernetes.io/name
            from: pod

    attributes/logs:
      actions:
        - action: insert
          key: service_name
          from_attribute: k8s.deployment.name
        - action: insert
          key: job
          from_attribute: k8s.namespace.name
        - action: insert
          key: loki.attribute.labels
          value: job,k8s.namespace.name,k8s.pod.name,k8s.container.name,k8s.node.name,service_name

    resource/tempo:
      attributes:
        - action: upsert
          key: service.name
          from_attribute: k8s.deployment.name
        - action: upsert
          key: k8s.namespace.name
          from_attribute: k8s.namespace.name
        - action: upsert
          key: k8s.pod.name
          from_attribute: k8s.pod.name
        - action: upsert
          key: k8s.node.name
          from_attribute: k8s.node.name

  exporters:
    loki:
      endpoint: http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push
      default_labels_enabled:
        exporter: false
        job: true

    otlp/tempo:
      endpoint: tempo.tempo.svc.cluster.local:4317
      tls:
        insecure: true

    prometheusremotewrite:
      endpoint: http://prometheus-server.prometheus.svc.cluster.local/api/v1/write

    debug:
      verbosity: basic

  service:
    extensions: [health_check]
    pipelines:
      logs:
        receivers: [filelog]
        processors: [k8sattributes, attributes/logs, batch, memory_limiter]
        exporters: [loki]
      traces:
        receivers: [otlp]
        # baggage processor pehle — taaki baad wale processors enriched attributes dekh sakein
        processors: [k8sattributes, resource/tempo, batch, memory_limiter]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp, prometheus]
        processors: [k8sattributes, batch, memory_limiter]
        exporters: [prometheusremotewrite]

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true

service:
  enabled: true

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: null
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: null
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - nodes
        - nodes/proxy
        - services
        - endpoints
        - pods
        - namespaces
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
      verbs: ["get", "list", "watch"]